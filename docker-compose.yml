services:
  mysql:
    build:
      context: .
      dockerfile: ./docker/mysql/Dockerfile
    container_name: laravel_mysql
    # 1. AUTO START: Ensures the container restarts if it crashes or the host reboots
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-sekawan_db}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    # 2. STATELESS TO STATEFUL: Mounts internal data to a persistent local volume
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    driver: local
